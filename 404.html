<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found | Oh My Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2 {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div class="min-h-screen flex flex-col items-center justify-center text-center px-4" style="background-image: url('/images/hero-bg.jpg'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-black opacity-50"></div>
        <div class="relative z-10">
            <div class="mb-4">
                <a href="/"><img src="/images/logo.png" alt="Oh My Glass Logo" class="h-20 mx-auto" /></a>
            </div>
            <h1 class="text-8xl md:text-9xl font-black text-white drop-shadow-lg">404</h1>
            <h2 class="text-3xl md:text-4xl font-bold mt-4 text-white drop-shadow-md">Page Not Found</h2>
            <p class="text-lg mt-4 text-gray-200">Sorry, the page you are looking for could not be found.</p>
            <a href="/" class="mt-8 inline-block bg-red-600 text-white font-semibold px-8 py-3 rounded-md hover:bg-red-700 transition-colors duration-300">
                Go Back to Homepage
            </a>
        </div>
    </div>
</body>
</html>
